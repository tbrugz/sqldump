
coverage:
  # https://docs.codecov.com/docs/coverage-configuration#section-range
  # range: 60..80
  # round: down
  # precision: 2
  status:
    project:
      default:
        # https://docs.codecov.com/docs/commit-status#threshold 
        threshold: 2% # Allows a 2% drop without failing
        # target: 60%
        # https://docs.codecov.com/docs/commit-status#if_ci_failed
        # if_ci_failed: error
    # https://docs.codecov.com/docs/commit-status#patch-status
    patch: off
    #patch:
    #  default:
    #    # Require 80% coverage on the new changes instead of 100%
    #    target: 80%
    #    # Allow a 5% coverage margin before failing
    #    threshold: 5%
